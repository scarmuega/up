name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build tx3up binary for each OS/arch combination
  build-binaries:
    name: Build tx3up (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu Intel
          - os: ubuntu
            arch: intel
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tx3up-ubuntu-intel
          
          # Ubuntu ARM
          - os: ubuntu
            arch: arm
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: tx3up-ubuntu-arm
          
          # macOS Intel
          - os: mac
            arch: intel
            runner: macos-13
            target: x86_64-apple-darwin
            artifact_name: tx3up-mac-intel
          
          # macOS ARM
          - os: mac
            arch: arm
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact_name: tx3up-mac-arm
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
    
    - name: Add target for cross-compilation
      if: matrix.target != 'x86_64-unknown-linux-gnu' && matrix.target != 'x86_64-apple-darwin'
      run: rustup target add ${{ matrix.target }}
    
    - name: Install cross-compilation tools (Linux ARM)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
    
    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ matrix.target }}-cargo-
    
    - name: Build tx3up
      run: |
        if [ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ] || [ "${{ matrix.target }}" == "x86_64-apple-darwin" ]; then
          # Native build for x86_64 platforms
          cargo build --release
        else
          # Cross-compilation build
          cargo build --release --target ${{ matrix.target }}
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/tx3up target/release/tx3up
        fi
    
    - name: Verify binary exists
      run: |
        ls -la target/release/tx3up
        file target/release/tx3up
    
    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: target/release/tx3up
        retention-days: 1
    
  # Run E2E tests using the built binaries
  e2e-tests:
    name: E2E Tests (${{ matrix.os }}-${{ matrix.arch }}, ${{ matrix.test }}, ${{ matrix.channel }})
    runs-on: ${{ matrix.runner }}
    needs: build-binaries
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu Intel tests
          - os: ubuntu
            arch: intel
            runner: ubuntu-latest
            artifact_name: tx3up-ubuntu-intel
            test: fresh_install
            channel: stable
          - os: ubuntu
            arch: intel
            runner: ubuntu-latest
            artifact_name: tx3up-ubuntu-intel
            test: update_install
            channel: stable
          - os: ubuntu
            arch: intel
            runner: ubuntu-latest
            artifact_name: tx3up-ubuntu-intel
            test: fresh_install
            channel: nightly
          
          # Ubuntu ARM tests
          - os: ubuntu
            arch: arm
            runner: ubuntu-latest
            artifact_name: tx3up-ubuntu-arm
            test: fresh_install
            channel: stable
          - os: ubuntu
            arch: arm
            runner: ubuntu-latest
            artifact_name: tx3up-ubuntu-arm
            test: update_install
            channel: stable
          
          # macOS Intel tests
          - os: mac
            arch: intel
            runner: macos-13
            artifact_name: tx3up-mac-intel
            test: fresh_install
            channel: stable
          - os: mac
            arch: intel
            runner: macos-13
            artifact_name: tx3up-mac-intel
            test: update_install
            channel: stable
          
          # macOS ARM tests
          - os: mac
            arch: arm
            runner: macos-latest
            artifact_name: tx3up-mac-arm
            test: fresh_install
            channel: stable
          - os: mac
            arch: arm
            runner: macos-latest
            artifact_name: tx3up-mac-arm
            test: update_install
            channel: stable
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download tx3up binary
      uses: actions/download-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: target/release/
    
    - name: Make binary executable
      run: chmod +x target/release/tx3up
    
    - name: Verify binary
      run: |
        ls -la target/release/tx3up
        file target/release/tx3up
    
    - name: Install jq (for JSON validation)
      run: |
        if [[ "${{ matrix.os }}" == "ubuntu" ]]; then
          sudo apt-get update && sudo apt-get install -y jq
        elif [[ "${{ matrix.os }}" == "mac" ]]; then
          brew install jq
        fi
    
    - name: Run E2E test - ${{ matrix.test }}
      run: |
        echo "Running ${{ matrix.test }} test on ${{ matrix.os }}-${{ matrix.arch }} with channel ${{ matrix.channel }}"
        ./tests/e2e/${{ matrix.test }}.sh
      env:
        # Use a unique root directory for each test run
        TX3_ROOT_DIR: ${{ github.workspace }}/test-root-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.test }}-${{ matrix.channel }}
        TX3_CHANNEL: ${{ matrix.channel }}
    
    - name: Upload test artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.test }}-${{ matrix.channel }}
        path: |
          ${{ github.workspace }}/test-root-*/
          target/release/tx3up
        retention-days: 7
    
    - name: Display test summary
      if: always()
      run: |
        echo "## E2E Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **OS**: ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Architecture**: ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Test**: ${{ matrix.test }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Channel**: ${{ matrix.channel }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Runner**: ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ job.status }}" == "success" ]]; then
          echo "- **Result**: ✅ PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Result**: ❌ FAILED" >> $GITHUB_STEP_SUMMARY
        fi

  # Summary job that depends on all matrix jobs
  e2e-summary:
    name: E2E Tests Summary
    runs-on: ubuntu-latest
    needs: [build-binaries, e2e-tests]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        echo "## Overall E2E Test Results" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ needs.e2e-tests.result }}" == "success" ]]; then
          echo "🎉 All E2E tests passed!" >> $GITHUB_STEP_SUMMARY
          echo "📦 Built binaries for all platforms successfully" >> $GITHUB_STEP_SUMMARY
          exit 0
        else
          echo "❌ Some tests failed. Check individual job results for details." >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.build-binaries.result }}" != "success" ]]; then
            echo "🔨 Binary build stage failed" >> $GITHUB_STEP_SUMMARY
          fi
          exit 1
        fi