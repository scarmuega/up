name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e-tests:
    name: E2E Tests (${{ matrix.os }}-${{ matrix.arch }}, ${{ matrix.test }}, ${{ matrix.channel }})
    runs-on: ${{ matrix.runner }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu Intel
          - os: ubuntu
            arch: intel
            runner: ubuntu-latest
            test: fresh_install
            channel: stable
          - os: ubuntu
            arch: intel
            runner: ubuntu-latest
            test: update_install
            channel: stable
          # Test with different channel on Ubuntu Intel
          - os: ubuntu
            arch: intel
            runner: ubuntu-latest
            test: fresh_install
            channel: nightly
          
          # Ubuntu ARM (using emulation)
          - os: ubuntu
            arch: arm
            runner: ubuntu-latest
            test: fresh_install
            channel: stable
          - os: ubuntu
            arch: arm
            runner: ubuntu-latest
            test: update_install
            channel: stable
          
          # macOS Intel
          - os: mac
            arch: intel
            runner: macos-13  # Intel-based runner
            test: fresh_install
            channel: stable
          - os: mac
            arch: intel
            runner: macos-13
            test: update_install
            channel: stable
          
          # macOS ARM
          - os: mac
            arch: arm
            runner: macos-latest  # ARM-based runner (M1)
            test: fresh_install
            channel: stable
          - os: mac
            arch: arm
            runner: macos-latest
            test: update_install
            channel: stable
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
    
    - name: Set up cross-compilation (ARM on Ubuntu)
      if: matrix.os == 'ubuntu' && matrix.arch == 'arm'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
        rustup target add aarch64-unknown-linux-gnu
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
    
    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ matrix.runner }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ matrix.runner }}-cargo-
    
    - name: Build tx3up (Intel)
      if: matrix.arch == 'intel'
      run: cargo build --release
    
    - name: Build tx3up (ARM on Ubuntu)
      if: matrix.os == 'ubuntu' && matrix.arch == 'arm'
      run: cargo build --release --target aarch64-unknown-linux-gnu
    
    - name: Build tx3up (ARM on macOS)
      if: matrix.os == 'mac' && matrix.arch == 'arm'
      run: cargo build --release
    
    - name: Copy ARM binary to standard location (Ubuntu)
      if: matrix.os == 'ubuntu' && matrix.arch == 'arm'
      run: |
        mkdir -p target/release
        cp target/aarch64-unknown-linux-gnu/release/tx3up target/release/tx3up
    
    - name: Verify binary exists
      run: |
        ls -la target/release/tx3up
        file target/release/tx3up
    
    - name: Install jq (for JSON validation)
      run: |
        if [[ "${{ matrix.os }}" == "ubuntu" ]]; then
          sudo apt-get update && sudo apt-get install -y jq
        elif [[ "${{ matrix.os }}" == "mac" ]]; then
          brew install jq
        fi
    
    - name: Run E2E test - ${{ matrix.test }}
      run: |
        echo "Running ${{ matrix.test }} test on ${{ matrix.os }}-${{ matrix.arch }} with channel ${{ matrix.channel }}"
        ./tests/e2e/${{ matrix.test }}.sh
      env:
        # Use a unique root directory for each test run
        TX3_ROOT_DIR: ${{ github.workspace }}/test-root-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.test }}-${{ matrix.channel }}
        TX3_CHANNEL: ${{ matrix.channel }}
    
    - name: Upload test artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.test }}-${{ matrix.channel }}
        path: |
          ${{ github.workspace }}/test-root-*/
          target/release/tx3up
        retention-days: 7
    
    - name: Display test summary
      if: always()
      run: |
        echo "## E2E Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **OS**: ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Architecture**: ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Test**: ${{ matrix.test }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Channel**: ${{ matrix.channel }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Runner**: ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ job.status }}" == "success" ]]; then
          echo "- **Result**: ✅ PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Result**: ❌ FAILED" >> $GITHUB_STEP_SUMMARY
        fi

  # Summary job that depends on all matrix jobs
  e2e-summary:
    name: E2E Tests Summary
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()
    
    steps:
    - name: Check test results
      run: |
        echo "## Overall E2E Test Results" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ needs.e2e-tests.result }}" == "success" ]]; then
          echo "🎉 All E2E tests passed!" >> $GITHUB_STEP_SUMMARY
          exit 0
        else
          echo "❌ Some E2E tests failed. Check individual job results for details." >> $GITHUB_STEP_SUMMARY
          exit 1
        fi